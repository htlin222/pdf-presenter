name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0)"
        required: true
        type: string

# Trusted publisher authentication: npm uses the GitHub OIDC token, so
# no NPM_TOKEN secret is needed. The package is configured on npmjs.com
# with "Trusted Publisher" pointing at htlin222/pdf-presenter → publish.yml.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        # NOTE: intentionally NOT passing `registry-url`. If we did, setup-node
        # would drop an .npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
        # into the workspace. With no NODE_AUTH_TOKEN env var set, that line
        # expands to an empty bearer token and short-circuits the OIDC
        # Trusted Publisher flow. Leaving registry-url off means no .npmrc
        # is created, and `npm publish` detects the GitHub Actions OIDC
        # environment and authenticates via the trusted publisher.
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upgrade npm to latest (best OIDC Trusted Publisher support)
        run: npm install -g npm@latest

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Scrub any stray .npmrc that might have an empty authToken
        run: |
          rm -f .npmrc ~/.npmrc
          npm config get registry

      - name: Publish to npm (OIDC via Trusted Publisher)
        run: npm publish --provenance --access public
